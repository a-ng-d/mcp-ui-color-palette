name = "mcp-uicp"
main = "src/worker.ts"
compatibility_date = "2025-03-10"
workers_dev = true
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "UICPMcp" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UICPMcp"]

[vars]
# Set this to the deployed URL of api-ui-color-palette
# e.g. https://uicp.<your-subdomain>.workers.dev
API_URL = "https://uicp.workers.dev"
