name = "mcp-uicp"
main = "src/worker.ts"
compatibility_date = "2025-03-10"
workers_dev = true
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "UICPMcp" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UICPMcp"]

[vars]
API_URL = "https://api-uicp.yelbolt.workers.dev"
SUPABASE_URL = "https://zclweepgvqkrelyfwhma.supabase.co"

[observability]
[observability.logs]
enabled = true
invocation_logs = true
